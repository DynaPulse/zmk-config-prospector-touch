# Prospector Touch - hybrid dongle/scanner shield defaults

# Display + UI
CONFIG_ZMK_DISPLAY=y
CONFIG_LVGL=y
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_CUSTOM=y
CONFIG_FPU=y
CONFIG_FPU_SHARING=y

# PWM backlight (pwm-leds "disp_bl")
CONFIG_PWM=y
CONFIG_LED=y
CONFIG_LED_PWM=y

# Always-central hybrid dongle: USB + BLE endpoints
CONFIG_ZMK_SPLIT=y
CONFIG_ZMK_SPLIT_ROLE_CENTRAL=y
CONFIG_ZMK_USB=y
CONFIG_ZMK_BLE=y

# Pull peripheral battery levels and re-broadcast for the UI
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y

# Battery mode: passive BLE observer (scanner) parsing status adverts
CONFIG_BT_OBSERVER=y
CONFIG_PROSPECTOR_MODE_SCANNER=y
CONFIG_PROSPECTOR_MAX_KEYBOARDS=3

# Touch + input processing (CST816S -> swipe)
CONFIG_PROSPECTOR_TOUCH_ENABLED=y
CONFIG_INPUT=y
CONFIG_INPUT_CST816S=y
CONFIG_INPUT_CST816S_INTERRUPT=y
CONFIG_ZMK_POINTING=y

# Settings persistence (NVS) for brightness / layout / channel
CONFIG_SETTINGS=y

# WPM for the stats page
CONFIG_ZMK_WPM=y

# Power: aggressive idle on battery + soft-off
CONFIG_ZMK_STATUS_ADV_ACTIVITY_BASED=y
CONFIG_ZMK_PM_SOFT_OFF=y

# LVGL widgets + fonts used by the UI
CONFIG_LV_USE_LABEL=y
CONFIG_LV_USE_BAR=y
CONFIG_LV_USE_FLEX=y
CONFIG_LV_USE_ANIMATION=y
CONFIG_LV_FONT_MONTSERRAT_20=y
CONFIG_LV_FONT_MONTSERRAT_28=y
CONFIG_LV_FONT_MONTSERRAT_40=y
CONFIG_LV_FONT_DEFAULT_MONTSERRAT_20=y
